<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobeGuard | Universal Travel Safety</title>
    
    <!-- Mapbox for 3D Maps -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #002d5a;
            --accent: #00d4ff;
            --danger: #ff3b3b;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: white; overflow: hidden; }

        /* Login Overlay */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, var(--primary), #000);
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .logo-circle {
            width: 120px; height: 120px; border: 3px solid var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; box-shadow: 0 0 20px var(--accent);
            background: url('https://api.dicebear.com/7.x/initials/svg?seed=GG') center/cover;
        }

        /* App Layout */
        #app { display: none; height: 100vh; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* Top HUD */
        .hud-top {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between; z-index: 10;
        }

        .status-pill {
            background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px;
            backdrop-filter: blur(10px); border: 1px solid var(--glass); font-size: 12px;
        }

        /* SOS Button */
        .sos-btn {
            position: absolute; bottom: 100px; right: 20px;
            width: 70px; height: 70px; background: var(--danger);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; box-shadow: 0 0 20px rgba(255,59,59,0.6);
            z-index: 100; border: 4px solid white; animation: pulse 2s infinite;
        }

        /* Bottom Nav */
        .nav-bar {
            position: absolute; bottom: 0; width: 100%; height: 70px;
            background: rgba(0,0,0,0.9); display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid var(--glass); z-index: 100;
        }

        .nav-item { color: #888; text-align: center; font-size: 10px; text-decoration: none; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        button { cursor: pointer; border: none; border-radius: 8px; }
        .login-input { padding: 12px; margin: 10px; border-radius: 8px; width: 250px; border: none; }
    </style>
</head>
<body>

    <!-- LOGIN SYSTEM -->
    <div id="login-screen">
        <div class="logo-circle"></div>
        <h1 style="margin:0">GlobeGuard</h1>
        <p style="color: #aaa; margin-bottom: 30px;">Your 3D Survival Companion</p>
        <input type="email" placeholder="Email" class="login-input" id="email">
        <button onclick="handleLogin()" style="background: var(--accent); color: #000; padding: 12px 50px; font-weight: bold;">SIGN IN WITH PAYPAL</button>
        <p style="font-size: 10px; margin-top: 20px; opacity: 0.5;">WORKING OFFLINE MODE ENABLED</p>
    </div>

    <!-- MAIN APP -->
    <div id="app">
        <div class="hud-top">
            <div class="status-pill" id="weather"><i class="fas fa-cloud"></i> Loading Weather...</div>
            <div class="status-pill" style="color: #4cd137;"><i class="fas fa-shield-halved"></i> Area: Safe</div>
        </div>

        <div id="map"></div>

        <div class="sos-btn" onclick="triggerSOS()">SOS</div>

        <div class="nav-bar">
            <div class="nav-item active"><i class="fas fa-map-location-dot"></i>Map</div>
            <div class="nav-item"><i class="fas fa-language"></i>Translate</div>
            <div class="nav-item"><i class="fas fa-wallet"></i>Currency</div>
            <div class="nav-item" onclick="deleteAccount()"><i class="fas fa-user-gear"></i>Account</div>
        </div>
    </div>

    <script>
        // PERSISTENT LOGIN LOGIC
        window.onload = () => {
            if (localStorage.getItem('gg_session')) {
                showApp();
            }
        };

        function handleLogin() {
            const email = document.getElementById('email').value;
            if(email) {
                localStorage.setItem('gg_session', email);
                showApp();
            } else {
                alert("Please enter credentials");
            }
        }

        function deleteAccount() {
            if(confirm("Permanently delete account and data?")) {
                localStorage.removeItem('gg_session');
                location.reload();
            }
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            initMap();
            loadDummyData();
        }

        // 3D MAP ENGINE (Mapbox)
        function initMap() {
            // Placeholder Token - Replace with your own from mapbox.com
            mapboxgl.accessToken = 'pk.eyJ1IjoibWFwYm94IiwiYSI6ImNpejY4M29iazA2Z2gycXA4N2pmbDZnd3IifQ.m6Q9vR-No_h5_67262mGmA';
            
            const map = new mapboxgl.Map({
                container: 'map',
                style: 'mapbox://styles/mapbox/navigation-night-v1',
                center: [-74.006, 40.7128], // Default to NYC
                zoom: 15,
                pitch: 60,
                bearing: -17
            });

            map.addControl(new mapboxgl.GeolocateControl({
                positionOptions: { enableHighAccuracy: true },
                trackUserLocation: true,
                showUserHeading: true
            }));

            // Add 3D Buildings
            map.on('load', () => {
                map.addLayer({
                    'id': '3d-buildings',
                    'source': 'composite',
                    'source-layer': 'building',
                    'filter': ['==', 'extrude', 'true'],
                    'type': 'fill-extrusion',
                    'minzoom': 15,
                    'paint': {
                        'fill-extrusion-color': '#aaa',
                        'fill-extrusion-height': ['get', 'height'],
                        'fill-extrusion-base': ['get', 'min_height'],
                        'fill-extrusion-opacity': 0.6
                    }
                });
            });
        }

        // SOS LOGIC
        function triggerSOS() {
            const type = confirm("Press OK for LAND SOS (Police)\nPress CANCEL for MARITIME SOS (Sinking/Coast Guard)");
            const msg = type ? "Land SOS Activated" : "MARITIME MAYDAY ACTIVATED";
            
            // Visual SOS (Flashlight effect)
            document.body.style.backgroundColor = "red";
            setTimeout(() => document.body.style.backgroundColor = "#0b0e14", 200);
            
            alert(`${msg}\n\n1. GPS Location Sent\n2. Audio Recording Started\n3. Morse Code Pulse Started`);
            console.log("Distress Signal: " + (type ? "Standard" : "Maritime"));
        }

        // CURRENCY & WEATHER DATA
        function loadDummyData() {
            // Weather
            document.getElementById('weather').innerHTML = `<i class="fas fa-sun"></i> 24°C Tokyo`;
            
            // Currency (Simulated Offline Cache)
            console.log("Currency Cached: 1 USD = 0.92 EUR");
        }
    </script>
</body>
</html>
